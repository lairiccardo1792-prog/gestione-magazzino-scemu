<div class="landing-wrapper">
  <div class="blob blob-purple"></div>
  <div class="blob blob-indigo"></div>

  <div style="width: 100%; position: relative; z-index: 50; padding: 20px 0 0 0;">
    <div style="margin-bottom: 30px; border-bottom: 2px solid #6f42c1; padding: 0 40px 8px 40px; width: 100%;">
      <h1 style="color: #6f42c1; margin: 0; font-size: 2.5rem; letter-spacing: -1px; font-weight: 800;">
        SCEMU <span style="font-weight: 300; font-size: 1.2rem; color: #6c757d; margin-left: 10px;">Gestione Magazzino</span>
      </h1>
    </div>
  </div>

  <div class="landing-content" style="display: flex; justify-content: center; align-items: flex-start; width: 100%; flex-grow: 1; padding: 40px 20px; position: relative; z-index: 60;">
    
    <div class="login-card shadow-lg" style="max-width: 500px; width: 100%;">
      <div class="text-center mb-4">
        <h1 style="color: white; font-family: 'Syne', sans-serif">Elimina Prodotto</h1>
        <p style="color: #6c757d">Inserisci l'ID del prodotto da rimuovere dal database</p>
      </div>

      <form (ngSubmit)="onElimina()" autocomplete="off">
        
        <div class="mb-4">
          <label class="form-label-custom">ID Prodotto</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-white">
              <i class="bi bi-hash"></i>
            </span>
            <input type="number" 
                   [(ngModel)]="prodottoId" 
                   name="prodottoId"
                   class="form-control" 
                   placeholder="Esempio: 6" 
                   required>
          </div>
        </div>

        <div class="p-3 mb-4 rounded-3" style="background: rgba(239, 68, 68, 0.1); border: 1px dashed #ef4444;">
          <p class="small text-danger m-0">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Attenzione: l'eliminazione fallirà se il prodotto è collegato a ordini attivi.
          </p>
        </div>

        <div style="display: flex; gap: 15px; width: 100%">
          <button type="submit" 
                  [disabled]="loading || !prodottoId" 
                  class="btn-start" 
                  style="flex: 2; background: linear-gradient(135deg, #ef4444, #dc3545); box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);">
            <span *ngIf="!loading">ELIMINA ORA</span>
            <span *ngIf="loading">ELIMINAZIONE...</span>
            <i class="bi bi-trash3 ms-2"></i>
          </button>

          <button type="button" 
                  (click)="onReset()" 
                  class="btn-reset-blue" 
                  style="flex: 1">
            <span>RESET</span>
          </button>
        </div>
      </form>

      <div style="min-height: 80px; margin-top: 25px;">
        
        @if (successo) {
          <div class="alert-custom-success animate-fade-in">
            <i class="bi bi-check-circle-fill me-2"></i> Prodotto rimosso definitivamente.
          </div>
        }

        @if (errore) {
          <div class="alert-custom-error animate-fade-in">
            <i class="bi bi-exclamation-octagon-fill me-2"></i> 
            {{ messaggioErrore }}
          </div>
        }
      </div>
    </div>
  </div>

  <a [routerLink]="['/prodotti']" 
     class="btn btn-outline-info rounded-pill px-4 shadow-sm"
     style="position: absolute; bottom: 40px; right: 5%; z-index: 9999">
     <i class="bi bi-house-door me-2"></i> TORNA ALLA DASHBOARD
  </a>
</div>
