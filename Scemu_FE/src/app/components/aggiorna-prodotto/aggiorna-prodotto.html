<div class="landing-wrapper">
  <div class="blob blob-purple"></div>
  <div class="blob blob-indigo"></div>

  <!-- HEADER -->
  <div class="page-header">
    <h1>
      SCEMU <span>TelevideoCom.Co</span>
    </h1>
  </div>

  <!-- CONTENT -->
  <div class="landing-content">

    <div class="login-card">

      <div class="text-center mb-4">
        <h2>Modifica Prodotto</h2>
        <p>Aggiorna i dati del prodotto selezionato</p>
      </div>

      <form [formGroup]="prodottoForm" (ngSubmit)="onSubmit()">

        <!-- PRODOTTO -->
        <div class="mb-3">
          <label class="form-label-custom">ID e Nome Prodotto</label>

          <select formControlName="id" class="form-control" (change)="onProdottoChange($event)">
            <option value="" disabled selected>Seleziona prodotto:</option>
            <option *ngFor="let p of prodotti" [value]="p.id">
              {{ p.id }} - {{ p.nome }}
            </option>
          </select>

          <small class="error-placeholder">
            <ng-container *ngIf="prodottoForm.get('id')?.touched && prodottoForm.get('id')?.invalid">
              {{ getErrorMessage('id') }}
            </ng-container>
          </small>
        </div>

        <!-- PREZZO + STOCK -->
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label-custom">Prezzo (€)</label>
            <input type="number" formControlName="prezzo" class="form-control" min="0.01">

            <small class="error-placeholder">
              <ng-container *ngIf="prodottoForm.get('prezzo')?.touched && prodottoForm.get('prezzo')?.invalid">
                {{ getErrorMessage('prezzo') }}
              </ng-container>
            </small>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label-custom">Stock</label>
            <input type="number" formControlName="stock" class="form-control" min="1">

            <small class="error-placeholder">
              <ng-container *ngIf="prodottoForm.get('stock')?.touched && prodottoForm.get('stock')?.invalid">
                {{ getErrorMessage('stock') }}
              </ng-container>
            </small>
          </div>
        </div>

        <!-- CATEGORIA -->
        <div class="mb-4">
          <label class="form-label-custom">Categoria</label>

          <select formControlName="categoria" class="form-control" (change)="onCategoriaChange($event)">
            <option value="" disabled selected>Seleziona categoria:</option>
            <option *ngFor="let cat of categorie" [value]="cat">{{ cat }}</option>
          </select>

          <small class="error-placeholder">
            <ng-container *ngIf="prodottoForm.get('categoria')?.touched && prodottoForm.get('categoria')?.invalid">
              {{ getErrorMessage('categoria') }}
            </ng-container>
          </small>
        </div>

        <!-- ERRORE GENERALE -->
        <div *ngIf="erroreMessaggio" class="alert-error">
          {{ erroreMessaggio }}
        </div>

        <!-- BOTTONI -->
        <button type="submit" [disabled]="prodottoForm.invalid" class="btn-save">
          SALVA MODIFICHE
        </button>

        <button type="button" [routerLink]="['/prodotti']" class="btn-back">
          ANNULLA E TORNA ALLA LISTA
        </button>

      </form>

    </div>
  </div>
</div>
