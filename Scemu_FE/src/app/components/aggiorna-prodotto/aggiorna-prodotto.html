<div class="landing-wrapper">
  <div class="blob blob-purple"></div>
  <div class="blob blob-indigo"></div>

  <div style="width: 100%; position: relative; z-index: 50; padding: 20px 0 0 0;">
    <div style="margin-bottom: 30px; border-bottom: 2px solid #6f42c1; padding: 0 40px 8px 40px; width: 100%;">
      <h1 style="color: #6f42c1; margin: 0; font-size: 2.5rem; letter-spacing: -1px; font-weight: 800;">
        SCEMU <span style="font-weight: 300; font-size: 1.2rem; color: #6c757d; margin-left: 10px;">Gestione Magazzino</span>
      </h1>
    </div>
  </div>

  <div class="landing-content">
    <div class="login-card shadow-lg">

      <div class="text-center mb-4">
        <h2 style="color: white; font-family: 'Syne', sans-serif">Aggiorna Prodotto</h2>
        <p style="color: #6c757d">Modifica le info del database</p>
      </div>

      <form [formGroup]="prodottoForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label class="form-label-custom">ID e Nome Prodotto</label>
          <div class="select-wrapper">
            <select formControlName="id" class="form-control" (change)="onProdottoChange($event)">
              <option value="" disabled selected>Seleziona prodotto:</option>
              <option *ngFor="let p of prodotti" [value]="p.id">
                {{ p.id }} - {{ p.nome }}
              </option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label-custom">Prezzo (€)</label>
            <input type="number" formControlName="prezzo" class="form-control">
            <div *ngIf="prodottoForm.get('prezzo')?.errors?.['max']" class="text-danger mt-1" style="font-size: 0.8rem;">
              <i class="bi bi-info-circle me-1"></i> Prezzo massimo: 99.999€.
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label-custom">Stock</label>
            <input type="number" formControlName="stock" class="form-control">
            <div *ngIf="prodottoForm.get('stock')?.errors?.['max']" class="text-danger mt-1" style="font-size: 0.8rem;">
              <i class="bi bi-info-circle me-1"></i> Max quantità: 9999.
            </div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label-custom">Categoria</label>
          <select formControlName="categoria" class="form-control" (change)="onCategoriaChange($event)">
            <option value="" disabled selected>Seleziona categoria:</option>
            <option *ngFor="let cat of categorie" [value]="cat">
              {{cat}}
            </option>
          </select>
        </div>

        <div *ngIf="erroreMessaggio" class="alert alert-danger py-2 mb-3"
          style="font-size: 0.9rem; border-radius: 10px; background: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #dc3545;">
          <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ erroreMessaggio }}
        </div>

        <button type="submit" [disabled]="prodottoForm.invalid" class="btn-save">
          SALVA MODIFICHE
        </button>

        <button type="button" [routerLink]="['/prodotti']" class="btn-back">
          ANNULLA E TORNA ALLA LISTA
        </button>

      </form>

    </div>
  </div>
  <a [routerLink]="['/prodotti']" class="btn btn-outline-info rounded-pill px-4 shadow-sm"
    style="position: absolute; bottom: 40px; right: 5%; z-index: 9999">
    <i class="bi bi-house-door me-2"></i> TORNA ALLA DASHBOARD
  </a>
</div>
